name: Convert Images to WebP

on:
  push:
    branches:
      - main
    paths:
      - 'assets/**'
      - 'branding/**'
      - 'clothing/**'
      - 'dui/**'
      - 'props/**'
      - 'char/**'
      - 'faces/**'
      - 'parents/**'
      - 'ps-housing/**'
  workflow_dispatch:
    inputs:
      preserve_originals:
        description: 'Preserve original images (png, jpg)?'
        type: boolean
        required: true
        default: true

concurrency:
  group: convert-images
  cancel-in-progress: false

jobs:
  convert-images:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        cache: 'pip'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run Conversion Script
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${{ inputs.preserve_originals }}" == "false" ]; then
          python convert_to_webp.py --delete-originals
        else
          python convert_to_webp.py
        fi

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add -A
        git diff --cached --quiet || git commit -m 'Auto: Convert images to WebP'
        git pull --rebase origin main
        git push
